server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/snack?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  sql:
    init:
      mode: never

app:
  upload:
    image-dir: uploads/snacks
    image-url-prefix: /uploads/snacks/
  sms:
    aliyun:
      access-key-id: your-access-key-id
      access-key-secret: your-access-key-secret
      region-id: cn-qingdao
      sign-name: 云渚科技验证平台
      template-code: "100001"

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
